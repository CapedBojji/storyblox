[tools]
node = "26"
"npm:pnpm" = "11.8.0"
zune = { version = "0.5.7", matching = "zune" }

[tool_alias]
zune = "github:Scythe-Technology/Zune"

[tasks.install]
description = "Install Node dependencies"
run = "pnpm install"

[tasks.check]
description = "Run typecheck, tests, build, and audit"
run = [
  "pnpm run typecheck",
  "pnpm test",
  "pnpm run build",
  "pnpm audit --audit-level=low",
]

[tasks.dev]
description = "Start the UI Claps preview server"
run = "pnpm run dev"
